<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xcpc.link 收藏站</title>
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(245, 247, 251, 0.12), transparent 34%),
          linear-gradient(180deg, #090d16 0%, #05070d 68%, #080b12 100%);
        color: #f5f7fb;
        transition:
          opacity 0.42s ease,
          visibility 0.42s ease;
      }

      #app-preloader.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #app-preloader.is-finishing .preloader-icon {
        animation-duration: 0.86s;
      }

      body:not(.is-app-visible) #app {
        visibility: hidden;
      }

      .preloader-shell {
        width: min(82vw, 560px);
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 28px;
        text-align: left;
      }

      .preloader-icon {
        width: 104px;
        aspect-ratio: 1;
        display: block;
        border-radius: 24px;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 18px 52px rgba(0, 0, 0, 0.28);
        animation: preloader-pulse 1.72s ease-in-out infinite;
      }

      .preloader-copy {
        min-width: 0;
        display: grid;
        gap: 18px;
      }

      .preloader-copy strong {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        font-size: clamp(32px, 6vw, 48px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
      }

      .preloader-copy span {
        color: rgba(221, 229, 244, 0.62);
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .preloader-progress {
        width: min(42vw, 280px);
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(245, 247, 251, 0.14);
      }

      .preloader-progress span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: #f5f7fb;
        transform-origin: 0% 50%;
        transform: scaleX(0.08);
        animation: preloader-progress-half 0.9s ease-out forwards;
      }

      #app-preloader.is-finishing .preloader-progress span {
        animation: preloader-progress-done 0.52s ease-in-out forwards;
      }

      @keyframes preloader-pulse {
        0%,
        100% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.035);
        }
      }

      @keyframes preloader-progress-half {
        0% {
          transform: scaleX(0.08);
        }

        100% {
          transform: scaleX(0.52);
        }
      }

      @keyframes preloader-progress-done {
        0% {
          transform: scaleX(0.52);
        }

        100% {
          transform: scaleX(1);
        }
      }

      @media (max-width: 560px) {
        .preloader-shell {
          width: 88vw;
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 22px;
          text-align: center;
        }

        .preloader-icon {
          width: 92px;
          border-radius: 21px;
        }

        .preloader-copy {
          justify-items: center;
        }

        .preloader-progress {
          width: min(68vw, 260px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-preloader" role="status" aria-label="Loading XCPC link">
      <div class="preloader-shell">
        <svg class="preloader-icon" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="8" y="6" width="48" height="52" rx="8" fill="#1d1d1f" />
          <path d="M22 18H42V47L32 40L22 47V18Z" fill="#ffffff" />
          <path d="M27 25H37" stroke="#007aff" stroke-width="4" stroke-linecap="round" />
        </svg>
        <div class="preloader-copy">
          <strong>XCPC.LINK</strong>
          <span>Preparing collection space</span>
          <div class="preloader-progress" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
